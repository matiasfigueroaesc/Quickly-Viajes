server:
  port: 8084

spring:
  application:
    name: ms-pagos
  
  # IMPORTANTE: Cambiar entre MySQL y H2 usando profiles
  # Para MySQL (default): no hacer nada
  # Para H2 (desarrollo sin MySQL): agregar en IDE/CLI: -Dspring.profiles.active=h2
  
  datasource:
    # MySQL (PRODUCCION Y DESARROLLO CON LARAGON)
    url: jdbc:mysql://localhost:3306/pagosdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    driverClassName: com.mysql.cj.jdbc.Driver
    username: root
    password:
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  
  flyway:
    enabled: true
    baseline-on-migrate: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    instance-id: ${spring.application.name}:${server.port}
    lease-renewal-interval-in-seconds: 5
    lease-expiration-duration-in-seconds: 10
    prefer-ip-address: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    use-root-path: true
microservicios:
  viajes:
    url: http://localhost:8083
---
# PERFIL H2: para desarrollo sin MySQL instalado
spring:
  config:
    activate:
      on-profile: h2
  datasource:
    url: jdbc:h2:file:./data/ms-pagosdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
    username: sa
    password: password
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
      path: /h2-console
