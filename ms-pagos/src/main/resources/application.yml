server:
  port: 8084

spring:
  application:
    name: ms-pagos
  datasource:
    url: jdbc:h2:mem:pagosdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
    username: sa
    password: password
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: validate
    show-sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
  flyway:
    enabled: true
    baseline-on-migrate: true

# URL de ms-viajes para validar que el viaje existe antes de registrar un pago
microservicios:
  viajes:
    url: http://localhost:8083
