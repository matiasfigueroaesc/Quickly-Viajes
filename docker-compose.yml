services:
  mysql:
    image: mysql:8.0
    container_name: quicklyviajes-mysql
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -proot --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  eureka-server:
    build:
      context: .
      dockerfile: eureka-server/Dockerfile
    container_name: quicklyviajes-eureka
    ports:
      - "18761:8761"

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: quicklyviajes-gateway
    ports:
      - "18080:8080"
    environment:
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8761/eureka/
      JWT_SECRET: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    depends_on:
      eureka-server:
        condition: service_started

  ms-auth:
    build:
      context: .
      dockerfile: ms-auth/Dockerfile
    container_name: quicklyviajes-ms-auth
    ports:
      - "8091:8091"
    environment:
      SERVER_PORT: 8091
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/authdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8761/eureka/
      JWT_SECRET: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started

  ms-pasajeros:
    build:
      context: .
      dockerfile: ms-pasajeros/Dockerfile
    container_name: quicklyviajes-ms-pasajeros
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/pasajerosdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8761/eureka/
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started

  ms-conductores:
