      context: .
      dockerfile: ms-conductores/Dockerfile
    container_name: quicklyviajes-ms-conductores
    ports:
      - "8082:8082"
    environment:
      SERVER_PORT: 8082
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/conductoresdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8761/eureka/
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started

  ms-viajes:
    build:
      context: .
      dockerfile: ms-viajes/Dockerfile
    container_name: quicklyviajes-ms-viajes
    ports:
      - "8083:8083"
    environment:
      SERVER_PORT: 8083
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/viajesdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8761/eureka/
      MICROSERVICIOS_PASAJEROS_URL: http://ms-pasajeros:8081
      MICROSERVICIOS_CONDUCTORES_URL: http://ms-conductores:8082
      MICROSERVICIOS_TARIFAS_URL: http://ms-tarifas:8085
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started

  ms-pagos:
